<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tiers — AEM-CONSEIL</title>
<meta name="description" content="Répertoire des tiers (clients & fournisseurs) — AEM-CONSEIL.">
<meta name="theme-color" content="#04050b">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="512x512" href="../assets/favicon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --noir:#04050b; --noir2:#070912; --noir3:#0b0e1a;
    --outremer:#2b45ff; --azur:#6d86ff; --peri:#a9b8ff;
    --line:rgba(150,168,255,.11); --line-2:rgba(150,168,255,.18);
    --glass:rgba(255,255,255,.035); --glass-2:rgba(255,255,255,.06);
    --txt:#f2f4ff; --txt2:#8b98bd; --pos:#3ee9a4; --danger:#ff6b7d;
  }
  *{box-sizing:border-box;margin:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--txt);background:var(--noir);-webkit-font-smoothing:antialiased;line-height:1.5;
    height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
  body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:radial-gradient(720px 500px at 50% -8%,rgba(43,69,255,.16),transparent 60%),linear-gradient(180deg,#05060e,#04050b)}
  a{color:inherit;text-decoration:none}
  .disp{font-family:'Inter Tight',sans-serif;letter-spacing:-.01em}

  /* Topbar */
  .topbar{flex:none;position:sticky;top:0;z-index:60;padding:11px clamp(14px,3vw,26px);
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(12,16,30,.82),rgba(7,9,18,.72));
    -webkit-backdrop-filter:blur(22px) saturate(180%);backdrop-filter:blur(22px) saturate(180%)}
  .topbar .brand{display:flex;align-items:center;gap:13px}
  .topbar .brand img{height:28px;display:block;filter:brightness(1.14) drop-shadow(0 0 8px rgba(169,184,255,.4))}
  .topbar .brand .sep{width:1px;height:24px;background:var(--line-2)}
  .topbar .brand .tag{font-family:'Inter Tight';font-weight:600;font-size:14px}
  .topbar .brand .tag small{display:block;font-family:'Inter';font-weight:400;font-size:11px;color:var(--txt2)}
  .embed-title{display:none;margin-right:auto;align-items:center;gap:9px;font-family:'Inter Tight';font-weight:600;font-size:15px}
  .embed-title .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:rgba(43,69,255,.16);color:var(--peri)}
  .embed-title .ic svg{width:15px;height:15px}
  body.embed .topbar .brand{display:none}
  body.embed .embed-title{display:inline-flex}
  .topbar .actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:7px;background:var(--noir2);border:1px solid var(--line-2);border-radius:10px;padding:7px 11px}
  .search svg{width:15px;height:15px;color:var(--txt2);flex:none}
  .search input{border:none;background:none;color:var(--txt);font-family:inherit;font-size:13px;width:150px;outline:none}
  .search input::placeholder{color:#4a5578}

  .btn{font-family:'Inter Tight',sans-serif;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:7px;
    padding:8px 13px;border-radius:10px;font-size:13px;white-space:nowrap;transition:transform .16s,filter .2s,background .2s}
  .btn svg{width:15px;height:15px}
  .btn:hover{transform:translateY(-1px)}
  .btn-pri{color:#05061a;background:linear-gradient(135deg,#c2ccff,#2b45ff);box-shadow:0 8px 24px rgba(43,69,255,.36)}
  .btn-pri:hover{filter:brightness(1.06)}
  .btn-ghost{color:var(--txt);background:var(--glass);border:1px solid var(--line-2)}
  .btn-ghost:hover{background:var(--glass-2)}
  .btn-danger{color:var(--danger);background:rgba(255,107,125,.08);border:1px solid rgba(255,107,125,.28)}
  .btn-danger:hover{background:rgba(255,107,125,.16)}
  .btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--azur);outline-offset:2px}

  /* Shell 2 volets */
  .shell{flex:1;min-height:0;display:grid;grid-template-columns:340px 1fr;gap:0}
  @media(max-width:820px){.shell{grid-template-columns:1fr}.detail{display:none}.shell.show-detail .list{display:none}.shell.show-detail .detail{display:flex}}

  /* Liste */
  .list{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;overflow-y:auto}
  .list .lhead{padding:12px 16px 8px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#5a6488;font-weight:600;display:flex;justify-content:space-between;align-items:center}
  .titem{display:flex;align-items:center;gap:11px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--line);transition:background .15s}
  .titem:hover{background:var(--glass)}
  .titem.active{background:var(--glass-2);box-shadow:inset 3px 0 0 0 var(--azur)}
  .titem .av{width:34px;height:34px;border-radius:9px;flex:none;display:grid;place-items:center;font-family:'Inter Tight';font-weight:700;font-size:13px;color:#05061a;background:linear-gradient(135deg,#c2ccff,#7d93ff)}
  .titem.four .av{background:linear-gradient(135deg,#a9f0d0,#3ee9a4)}
  .titem .m{flex:1;min-width:0;display:flex;flex-direction:column}
  .titem .m .n{font-family:'Inter Tight';font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .titem .m .s{font-size:11.5px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .titem .badge{font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:999px;flex:none}
  .badge.client{background:rgba(43,69,255,.18);color:var(--peri)}
  .badge.four{background:rgba(62,233,164,.14);color:var(--pos)}
  .list-empty{padding:36px 20px;text-align:center;color:var(--txt2);font-size:13px}

  /* Détail */
  .detail{display:flex;flex-direction:column;min-height:0;overflow-y:auto;padding:20px clamp(16px,3vw,30px)}
  .detail .back{display:none}
  @media(max-width:820px){.detail .back{display:inline-flex;margin-bottom:12px}}
  .empty-state{margin:auto;text-align:center;max-width:320px;color:var(--txt2)}
  .empty-state .ic{width:60px;height:60px;margin:0 auto 16px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(109,134,255,.22),rgba(43,69,255,.18));border:1px solid var(--line-2);color:var(--peri)}
  .empty-state .ic svg{width:28px;height:28px}
  .empty-state h2{font-family:'Inter Tight';font-weight:600;font-size:18px;color:var(--txt);margin-bottom:8px}
  .empty-state p{font-size:13.5px;line-height:1.55}

  .form{display:flex;flex-direction:column;gap:14px;max-width:640px}
  .form-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .form-head h2{font-family:'Inter Tight';font-weight:600;font-size:17px}
  .seg{display:inline-flex;padding:3px;gap:3px;border:1px solid var(--line-2);border-radius:10px;background:var(--noir2)}
  .seg button{border:none;background:none;color:var(--txt2);font-family:'Inter Tight';font-weight:600;font-size:12.5px;padding:6px 14px;border-radius:7px;cursor:pointer;transition:.16s}
  .seg button.on{background:linear-gradient(135deg,rgba(109,134,255,.3),rgba(43,69,255,.26));color:#fff}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media(max-width:520px){.grid2{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:4px;min-width:0}
  .field.col-2{grid-column:span 2}
  @media(max-width:520px){.field.col-2{grid-column:auto}}
  label{font-size:11px;letter-spacing:.02em;color:var(--txt2);font-weight:500}
  input,textarea{width:100%;font-family:inherit;font-size:13.5px;color:var(--txt);background:var(--noir2);border:1px solid var(--line-2);border-radius:9px;padding:9px 11px;transition:border-color .18s,background .18s}
  input:focus,textarea:focus{border-color:var(--azur);background:var(--noir3)}
  input::placeholder,textarea::placeholder{color:#4a5578}
  textarea{resize:vertical;min-height:56px;line-height:1.5}
  .form-actions{display:flex;gap:9px;margin-top:4px;flex-wrap:wrap}
  .form-actions .btn-pri{flex:1;justify-content:center;min-width:130px}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);z-index:200;background:var(--noir3);border:1px solid var(--line-2);color:var(--txt);
    padding:11px 18px;border-radius:11px;font-size:13px;box-shadow:0 16px 40px rgba(0,0,0,.5);opacity:0;visibility:hidden;transition:.24s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .toast .d{width:7px;height:7px;border-radius:50%;background:var(--pos)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="../index.html" aria-label="Retour au site AEM-CONSEIL">
    <img src="../assets/logo-full.png" alt="AEM CONSEIL">
    <span class="sep"></span>
    <span class="tag">Tiers<small>Clients &amp; fournisseurs</small></span>
  </a>
  <span class="embed-title"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Tiers</span>
  <div class="actions">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Rechercher…" oninput="renderList()">
    </div>
    <button class="btn btn-pri" onclick="newTiers()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Nouveau tiers</button>
  </div>
</div>

<div class="shell" id="shell">
  <div class="list" id="list"></div>
  <div class="detail" id="detail"></div>
</div>

<div class="toast" id="toast"><span class="d"></span><span id="toastMsg"></span></div>

<script>
const LS_TIERS='aem_tiers';
function load(){ try{ return JSON.parse(localStorage.getItem(LS_TIERS)||'[]'); }catch(e){ return []; } }
function save(list){ localStorage.setItem(LS_TIERS, JSON.stringify(list)); }
function uid(){ return 't_'+Date.now().toString(36)+Math.floor(performance.now()).toString(36); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

let tiers = load();
let selId = null;   // id sélectionné ; '' = nouveau ; null = rien

function initials(name){ const p=(name||'').trim().split(/\s+/).filter(Boolean); return ((p[0]||'')[0]||'?').toUpperCase()+((p[1]||'')[0]||'').toUpperCase(); }

function renderList(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  let items=tiers.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','fr'));
  if(q) items=items.filter(t=>[t.name,t.contact,t.email,t.addr,t.siret].some(v=>(v||'').toLowerCase().includes(q)));
  const box=document.getElementById('list');
  const head='<div class="lhead"><span>'+tiers.length+' tiers</span></div>';
  if(!items.length){
    box.innerHTML=head+'<div class="list-empty">'+(tiers.length?'Aucun résultat.':'Aucun tiers pour le moment.<br>Cliquez sur « Nouveau tiers ».')+'</div>';
    return;
  }
  box.innerHTML=head+items.map(t=>{
    const four=t.type==='fournisseur';
    const sub=[t.contact,t.email,t.addr&&t.addr.split('\n')[0]].filter(Boolean)[0]||'—';
    return '<div class="titem'+(four?' four':'')+(t.id===selId?' active':'')+'" onclick="selectTiers(\''+t.id+'\')">'
      +'<span class="av">'+esc(initials(t.name))+'</span>'
      +'<span class="m"><span class="n">'+(esc(t.name)||'Sans nom')+'</span><span class="s">'+esc(sub)+'</span></span>'
      +'<span class="badge '+(four?'four':'client')+'">'+(four?'Fourn.':'Client')+'</span></div>';
  }).join('');
}

function blankT(){ return {id:'', type:'client', name:'', contact:'', email:'', phone:'', addr:'', siret:'', tva:'', notes:''}; }

function renderDetail(t){
  const isNew = !t.id;
  const shell=document.getElementById('shell'); shell.classList.add('show-detail');
  document.getElementById('detail').innerHTML=`
    <button class="btn btn-ghost back" onclick="closeDetail()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> Liste</button>
    <div class="form">
      <div class="form-head">
        <h2>${isNew?'Nouveau tiers':'Modifier le tiers'}</h2>
        <div class="seg">
          <button type="button" id="segClient" class="${t.type!=='fournisseur'?'on':''}" onclick="setType('client')">Client</button>
          <button type="button" id="segFour" class="${t.type==='fournisseur'?'on':''}" onclick="setType('fournisseur')">Fournisseur</button>
        </div>
      </div>
      <div class="grid2">
        <div class="field col-2"><label>Nom / Raison sociale</label><input id="t-name" value="${esc(t.name)}" placeholder="Société Cliente SARL"></div>
        <div class="field"><label>Contact (personne)</label><input id="t-contact" value="${esc(t.contact)}" placeholder="Marie Dupont"></div>
        <div class="field"><label>Email</label><input id="t-email" type="email" value="${esc(t.email)}" placeholder="contact@exemple.fr"></div>
        <div class="field"><label>Téléphone</label><input id="t-phone" value="${esc(t.phone)}" placeholder="06 00 00 00 00"></div>
        <div class="field"><label>SIRET</label><input id="t-siret" value="${esc(t.siret)}" placeholder="000 000 000 00000"></div>
        <div class="field col-2"><label>Adresse</label><textarea id="t-addr" placeholder="3 avenue du Client&#10;69000 Lyon">${esc(t.addr)}</textarea></div>
        <div class="field"><label>N° TVA intracom.</label><input id="t-tva" value="${esc(t.tva)}" placeholder="FR00000000000"></div>
        <div class="field col-2"><label>Notes</label><textarea id="t-notes" placeholder="Informations complémentaires…">${esc(t.notes)}</textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-pri" onclick="saveTiers()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg> Enregistrer</button>
        ${isNew?'':'<button class="btn btn-danger" onclick="deleteTiers()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> Supprimer</button>'}
      </div>
    </div>`;
  document.getElementById('detail').dataset.type = t.type||'client';
}

function renderEmpty(){
  const shell=document.getElementById('shell'); shell.classList.remove('show-detail');
  document.getElementById('detail').innerHTML=`
    <div class="empty-state">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <h2>Vos clients &amp; fournisseurs</h2>
      <p>Sélectionnez un tiers dans la liste pour le modifier, ou créez-en un nouveau. Vos tiers pourront être réutilisés dans vos factures.</p>
    </div>`;
}

function selectTiers(id){ selId=id; const t=tiers.find(x=>x.id===id); if(!t){ selId=null; renderEmpty(); } else { renderDetail(JSON.parse(JSON.stringify(t))); } renderList(); }
function newTiers(){ selId=''; renderDetail(blankT()); renderList(); document.getElementById('search').value=''; }
function closeDetail(){ selId=null; renderEmpty(); renderList(); }
function setType(v){ document.getElementById('detail').dataset.type=v; document.getElementById('segClient').classList.toggle('on',v==='client'); document.getElementById('segFour').classList.toggle('on',v==='fournisseur'); }

function readForm(){
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim():''; };
  return { type:document.getElementById('detail').dataset.type||'client', name:g('t-name'), contact:g('t-contact'), email:g('t-email'), phone:g('t-phone'), siret:g('t-siret'), addr:document.getElementById('t-addr').value.trim(), tva:g('t-tva'), notes:document.getElementById('t-notes').value.trim() };
}
function saveTiers(){
  const data=readForm();
  if(!data.name){ toast('Indiquez au moins un nom.'); document.getElementById('t-name').focus(); return; }
  if(selId){ const i=tiers.findIndex(x=>x.id===selId); if(i>=0){ tiers[i]=Object.assign(tiers[i],data,{updated:Date.now()}); } }
  else { const t=Object.assign({id:uid()},data,{updated:Date.now()}); tiers.unshift(t); selId=t.id; }
  save(tiers); renderList(); selectTiers(selId); toast('Tiers enregistré ✓');
}
function deleteTiers(){
  if(!selId) return;
  if(!confirm('Supprimer ce tiers définitivement ?')) return;
  tiers=tiers.filter(x=>x.id!==selId); save(tiers); selId=null; renderEmpty(); renderList(); toast('Tiers supprimé');
}

let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); document.getElementById('toastMsg').textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200); }

/* Init */
if(new URLSearchParams(location.search).has('embed')) document.body.classList.add('embed');
renderList();
renderEmpty();
</script>
</body>
</html>
